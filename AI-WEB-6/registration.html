<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration Form</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Event Registration Form</h1>
        
        <form id="registrationForm" class="registration-form">
            <div class="form-group">
                <label for="eventName">Event Name:</label>
                <input type="text" id="eventName" name="eventName" readonly>
            </div>

            <div class="form-group">
                <label for="participantName">Participant Name:</label>
                <input type="text" id="participantName" name="participantName" placeholder="Enter your full name">
                <span class="error-message" id="nameError"></span>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="mobileNumber">Mobile Number:</label>
                <input type="text" id="mobileNumber" name="mobileNumber" placeholder="Enter 10-digit mobile number">
                <span class="error-message" id="mobileError"></span>
            </div>

            <div class="form-group">
                <button type="submit" id="submitBtn" class="btn btn-submit">Submit</button>
                <button type="reset" id="resetBtn" class="btn btn-reset">Reset</button>
            </div>

            <div id="successMessage" class="success-message"></div>
        </form>

        <div class="back-link">
            <a href="index.html">Back to Events</a>
        </div>
    </div>

    <script src="registration.js"></script>
</body>
</html>
