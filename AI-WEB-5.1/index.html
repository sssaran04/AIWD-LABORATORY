<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Quiz Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="quiz-header">
            <h1>Quiz Application</h1>
            <div class="timer-container">
                <span class="timer-label">Time Remaining:</span>
                <span class="timer" id="timer">10</span>
                <span class="timer-unit">s</span>
            </div>
        </div>

        <div class="warning-message" id="warningMessage"></div>

        <div class="quiz-content" id="quizContent">
            <div class="question-container" id="questionContainer"></div>
            <div class="submit-section">
                <button class="submit-btn" id="submitBtn" onclick="submitQuiz()">Submit Quiz</button>
            </div>
        </div>

        <div class="score-section" id="scoreSection" style="display: none;">
            <h2>Quiz Completed!</h2>
            <div class="final-score">
                <p>Your Score:</p>
                <span class="score-display" id="scoreDisplay">0/5</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
